name: Build Bad Sector EXE

on:
  workflow_dispatch:
  push:
    paths:
      - "bad_sector.c"
      - "patch_v1.py"
      - "patch_v1_1.py"
      - "patch_v1_2.py"
      - "patch_v1_3.py"
      - "patch_v1_4.py"
      - "patch_v1_5.py"
      - "patch_v1_6.py"
      - "patch_v1_7.py"
      - "patch_v1_8.py"
      - "patch_v1_9.py"
      - ".github/workflows/build-windows.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository files
        uses: actions/checkout@v4

      - name: Apply Bad Sector v1.0 update
        run: python3 patch_v1.py

      - name: Apply Bad Sector v1.4 gameplay clarity update
        run: python3 patch_v1_1.py

      - name: Apply Bad Sector v1.5 polish update
        run: python3 patch_v1_2.py

      - name: Apply Bad Sector v1.6 interface and graphics update
        run: python3 patch_v1_3.py

      - name: Apply Bad Sector v1.6 initials control correction
        run: python3 patch_v1_4.py

      - name: Prepare Bad Sector v1.7 patch
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('patch_v1_5.py')
          s = p.read_text(encoding='utf-8')
          s = s.replace(
              's = s[:bar_start] + new_bar + s[draw_game_after_bar:]',
              's = s[:bar_start] + new_bar + helpers + s[draw_game_after_bar:]'
          )
          s = s.replace('y=649,w=126,h=66', 'y=657,w=126,h=58')
          p.write_text(s, encoding='utf-8')
          PY

      - name: Apply Bad Sector v1.7 mobile firewall and graphics update
        run: python3 patch_v1_5.py

      - name: Apply Bad Sector v1.8 intro, floppy and spread update
        run: python3 patch_v1_6.py

      - name: Apply Bad Sector v1.9 HUD, toolbar, beam and 1UP update
        run: python3 patch_v1_7.py

      - name: Apply Bad Sector v2.0 tool labels and death sequence
        run: python3 patch_v1_8.py

      - name: Apply Bad Sector v2.1 audio, utility effects and test tools
        run: python3 patch_v1_9.py

      - name: Install 32-bit MinGW compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-i686

      - name: Compile BadSector.exe
        run: |
          i686-w64-mingw32-gcc \
            -std=c99 \
            -Os \
            -s \
            -mwindows \
            -march=i686 \
            -ffunction-sections \
            -fdata-sections \
            -Wl,--gc-sections \
            -o BadSector.exe \
            bad_sector.c \
            -lgdi32 \
            -lwinmm \
            -lm

      - name: Show executable size
        run: |
          ls -lh BadSector.exe
          stat --format="%s bytes" BadSector.exe

      - name: Save compiled EXE
        uses: actions/upload-artifact@v4
        with:
          name: BadSector-Windows-32bit-v2.1
          path: BadSector.exe
          if-no-files-found: error
